# Edge reverse proxy in front of the app. The request-size limit is enforced here —
# oversized bodies are rejected with 413 before they ever reach the application
# (defense-in-depth alongside the app's @Size batch cap). This is where, in production,
# a gateway / Akamai edge would shed abusive requests.
server {
    listen 80;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
