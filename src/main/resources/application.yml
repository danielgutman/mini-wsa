spring:
  application:
    name: mini-wsa

server:
  port: 8080

# Storage selection: "memory" (default, in-memory adapter) or "clickhouse".
# ClickHouse connection is only used when miniwsa.storage=clickhouse.
miniwsa:
  storage: ${MINIWSA_STORAGE:memory}
  clickhouse:
    url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/mini_wsa}
    username: ${CLICKHOUSE_USER:mini_wsa}
    password: ${CLICKHOUSE_PASSWORD:mini_wsa}
  # Operational limits — override per environment (env / ConfigMap); apply via rolling restart.
  limits:
    max-batch-size: ${MINIWSA_MAX_BATCH_SIZE:10000}
    summary-top-limit: ${MINIWSA_SUMMARY_TOP_LIMIT:10}

# Actuator exposes health (liveness) plus Micrometer metrics in Prometheus format.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.akamai.miniwsa: DEBUG
