# Full stack: `docker compose up --build` brings up ClickHouse, the app (in ClickHouse
# mode), an nginx edge proxy that enforces the request-size limit, and a Prometheus that
# scrapes the app's metrics.
#
#   client ──► edge (nginx :8080) ──► app (:8080) ──► clickhouse (:8123)
#                                       ▲
#                       prometheus (:9090) scrapes app:8080/actuator/prometheus
#
# For app-only local dev you can instead run `docker compose up -d clickhouse` and start
# the app with `./mvnw spring-boot:run` (see README).
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: mini-wsa-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native TCP protocol
    environment:
      CLICKHOUSE_DB: mini_wsa
      CLICKHOUSE_USER: mini_wsa
      CLICKHOUSE_PASSWORD: mini_wsa
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./src/main/resources/db/ClickHouseSchema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # Defaults to a local build; set MINIWSA_IMAGE to run a published release image, e.g.
    #   MINIWSA_IMAGE=ghcr.io/danielgutman/mini-wsa:1.0.0 docker compose pull app && docker compose up -d
    image: ${MINIWSA_IMAGE:-mini-wsa:local}
    build: .
    container_name: mini-wsa-app
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      MINIWSA_STORAGE: clickhouse
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/mini_wsa
      CLICKHOUSE_USER: mini_wsa
      CLICKHOUSE_PASSWORD: mini_wsa
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  edge:
    image: nginx:1.27-alpine
    container_name: mini-wsa-edge
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"   # host 8080 -> nginx -> app
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mini-wsa-prometheus
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "9090:9090"   # Prometheus UI at http://localhost:9090
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  clickhouse-data:
