# Local ClickHouse for development. Brings up a single-node ClickHouse server.
# The schema in infrastructure/clickhouse/ClickHouseSchema.sql is applied on first
# start via the docker-entrypoint-initdb.d mount.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: mini-wsa-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native TCP protocol
    environment:
      CLICKHOUSE_DB: mini_wsa
      CLICKHOUSE_USER: mini_wsa
      CLICKHOUSE_PASSWORD: mini_wsa
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./src/main/resources/db/ClickHouseSchema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
