name: Release

# A release is cut on demand. The version comes from pom.xml (not entered by hand): the
# workflow reads it, runs the full-pipeline E2E test (10k+ events through a production-like
# ClickHouse), and only on success builds + pushes the versioned container image to GHCR and
# creates the vX.Y.Z tag + GitHub Release. So a release only happens if the pipeline passes.
#
# Developer milestones (vX.Y-something tags) are created manually and do NOT trigger this.
on:
  workflow_dispatch:

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven
      - name: Resolve version from pom.xml (reject SNAPSHOT)
        id: v
        run: |
          VERSION="$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "Resolved pom.xml version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to release a SNAPSHOT version ($VERSION). Set a release version in pom.xml first."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  e2e:
    name: Full-pipeline E2E
    runs-on: ubuntu-latest

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: mini_wsa
          CLICKHOUSE_USER: mini_wsa
          CLICKHOUSE_PASSWORD: mini_wsa
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Run full-pipeline E2E test
        env:
          E2E_ENABLED: "true"
          MINIWSA_STORAGE: clickhouse
          CLICKHOUSE_URL: jdbc:clickhouse://localhost:8123/mini_wsa
          CLICKHOUSE_USER: mini_wsa
          CLICKHOUSE_PASSWORD: mini_wsa
        run: ./mvnw --batch-mode --no-transfer-progress -Dtest=FullPipelineE2ETest test

  publish-image:
    name: Build & push image to GHCR
    needs: [version, e2e]   # only build/push the image if the E2E passed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mini-wsa
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ env.IMAGE }}:${{ env.VERSION }}
        run: |
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

  release:
    name: Create GitHub Release
    needs: [version, e2e, publish-image]   # release only if E2E passed AND the image was published
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release v${{ needs.version.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
